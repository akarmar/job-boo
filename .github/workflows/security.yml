name: Security Scanning

on:
  schedule:
    - cron: "0 9 * * 1"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  security-scan:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e .
          pip install bandit semgrep pip-audit

      - name: Semgrep scan
        run: semgrep --config auto src/ --error --output semgrep-results.txt || true

      - name: Bandit scan
        run: bandit -r src/ -ll -o bandit-results.txt -f txt || true

      - name: pip-audit
        run: pip-audit --output pip-audit-results.txt || true

      - name: Upload security results
        uses: actions/upload-artifact@v4
        with:
          name: security-scan-results
          path: |
            semgrep-results.txt
            bandit-results.txt
            pip-audit-results.txt
          retention-days: 30
